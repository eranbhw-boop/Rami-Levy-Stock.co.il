<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>רמי לוי סטוק — רשת הסטוק הזולה במדינה</title>
  <meta name="description" content="רמי לוי סטוק — רשת הסטוק הזולה במדינה. האתר יעלה בקרוב.">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 100%;
    }

    body {
      min-height: 100vh;
      background: #f9e3f1;
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
      line-height: 1.5;
    }

    .top-bar,
    .bottom-bar {
      position: fixed;
      left: 0;
      width: 100%;
      height: 6px;
      background: #E91E8C;
      z-index: 10;
    }

    .top-bar {
      top: 0;
    }

    .bottom-bar {
      bottom: 0;
    }

    .page-wrapper {
      min-height: 100vh;
      width: 100%;
      padding: 48px 20px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: radial-gradient(ellipse at center, #fdf0f7 0%, #f7d6ec 60%, #f0bde0 100%);
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(120, 20, 80, 0.18);
      padding: 56px 72px 46px;
      max-width: 580px;
      width: 100%;
      border-top: 5px solid #E91E8C;
    }

    .logo {
      width: 100%;
      max-width: 380px;
      height: auto;
      display: block;
      margin: 0 auto 36px;
      border-radius: 10px;
    }

    .divider {
      width: 64px;
      height: 4px;
      background: #E91E8C;
      margin: 0 auto 24px;
    }

    h1 {
      font-size: 1.25rem;
      margin-bottom: 10px;
      color: #222;
    }

    .tagline {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #7a2b58;
      text-transform: uppercase;
    }

    .footer {
      margin-top: 32px;
      font-size: 0.875rem;
      color: #5f3150;
    }

    .footer-links {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px 12px;
    }

    a {
      color: #6b1648;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    a:focus-visible {
      outline: 3px solid #222;
      outline-offset: 4px;
      border-radius: 4px;
    }

    @media (max-width: 520px) {
      .card {
        padding: 36px 24px 32px;
        border-radius: 12px;
      }

      .logo {
        max-width: 280px;
      }

      h1 {
        font-size: 1.1rem;
      }

      .tagline {
        font-size: 0.95rem;
        letter-spacing: 0.12em;
      }
    }
  </style>
</head>

<body>
  <div class="top-bar" aria-hidden="true"></div>
  <div class="bottom-bar" aria-hidden="true"></div>

  <main class="page-wrapper">
    <section class="card" aria-labelledby="main-title">
      <img
        class="logo"
        src="logo.png"
        alt="רמי לוי סטוק — רשת הסטוק הזולה במדינה"
      >

      <div class="divider" aria-hidden="true"></div>

      <h1 id="main-title">רמי לוי סטוק</h1>
      <p class="tagline">Coming Soon</p>
    </section>

<footer class="footer">
    <p>© 2026 רמי לוי סטוק. כל הזכויות שמורות.</p>

    <nav class="footer-links" aria-label="קישורים משפטיים">
        <a href="privacy.html">מדיניות פרטיות</a>
        <span aria-hidden="true">|</span>
        <a href="accessibility.html">הצהרת נגישות</a>
    </nav>
</footer>
    
  </main>
</body>
</html>
